<!DOCTYPE html>
<html lang = "en">
    <head>
        <title>Student OS - Homepage</title>
        <link rel = "stylesheet" href = "style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
        <style>
            #dashboard_grid {
                display: grid !important;
                grid-template-columns: repeat(2, 1fr) !important;
                grid-auto-flow: dense !important; 
                gap: 20px !important;
            }

            #current_focus_card {
                background-color: rgba(64, 64, 64, 0.5);
                border-radius: 10px;
                padding: 5px;
                height: 60vh;
                width: 75vw;
            } 

            #stats_card {
                background-color: rgba(64, 64, 64, 0.5);
                border-radius: 10px;
                padding: 5px;
                height: 60vh;
                width: 21.3vw;
            }

            #schedule_card {
                background-color: rgba(64, 64, 64, 0.5);
                border-radius: 10px;
                padding: 5px;
                height: 20vh;
                width: 75vw;             
            }

            #next_event_card {
                background-color: rgba(64, 64, 64, 0.5);
                border-radius: 10px;
                padding: 5px;
                height: 20vh;
                width: 21.3vw;
            }

            #task_card {
                background-color: rgba(64, 64, 64, 0.5);
                border-radius: 10px;
                padding: 5px;
                height: 20vh;
                width: 75vw; 
            }

            #quick_actions_card {
                background-color: rgba(64, 64, 64, 0.5);
                border-radius: 10px;
                padding: 5px;
                height: 20vh;
                width: 21.3vw;
            }

        </style>
    </head>
    <body>
        <div id = "dynamic_bar">
            <h1>Student OS</h1>
            <a id = "home_icon" href = "index.html">
                <img src = "icons/home.png" alt = "home" width = 30px>
            </a>
            <a id = "calendar_icon" href = "schedule.html">
                <img src = "icons/calendar.png" alt = "schedule" width = 30px>
            </a>
            <a id = "task_icon" href = "tasks.html">
                <img src = "icons/task.png" alt = "task" width = 30px>
            </a>
            <a id = "study_icon" href = "study.html">
                <img src = "icons/study.png" alt = "study" width = 30px>
            </a>
            <a id = "code_icon" href = "coding.html">
                <img src = "icons/code.png" alt = "code" width = 30px>
            </a>
            <a id = "health_icon" href = "health.html">
                <img src = "icons/health.png" alt = "health" width = 30px>
            </a>   
            <a id = "analytics_icon" href = "analytics.html">
                <img src = "icons/analytics.png" alt = "analytics" width = 30px>
            </a>  
            <a id = "settings_icon" href = "settings.html">
                <img src = "icons/settings.png" alt = "settings" width = 30px>
            </a>
        </div>
        <div id = "dashboard_grid">
            <div id = "current_focus_card">
                <h3>Current Focus</h3>
            </div>
            <div id = "stats_card">
                <h3>Statistics</h3>
            </div>
            <div id = "schedule_card">
                <h3>Schedule</h3>
            </div>
            <div id = "next_event_card">
                <h3>Next Event</h3>
            </div>
            <div id = "task_card">
                <h3>Tasks</h3>
            </div>
            <div id = "quick_actions_card">
                <h3>Quick Actions</h3>
            </div>
        </div>
    </body>
</html>
